max_page_split: 50

# pdf 레이아웃 분석
layout:
  type: dots_mocr # rule | detr | dots_mocr | dots_mocr_all | dots_mocr_grounding | dots_mocr_auto
  # type이 rule이 아니면 resource/<type>.yaml을 읽어 아래 설정과 병합한다
  # dots_mocr 계열은 텍스트 소스가 다른 4가지 변형(resource/README.md의 dots_mocr 섹션 참고):
  #   dots_mocr           - bbox/category만 감지, 텍스트는 PDF/OCR 그대로 (가장 저렴)
  #   dots_mocr_all       - bbox/category/text를 한 번에 추출 (PDF 텍스트를 아예 안 씀)
  #   dots_mocr_grounding - bbox/category 감지 후 region마다 grounding OCR로 텍스트 추출
  #   dots_mocr_auto      - dots_mocr와 동일하되, 글리프 깨진 줄만 grounding OCR로 재추출

# 표 구조 인식(현재 detr 전용 - detr가 감지한 "table" region을 tableformer로 다시 보내
# row/col 구조를 markdown 표로 재구성한다. dots_mocr 계열은 아직 미지원).
table_structure:
  type: tableformer # ~ | tableformer  (~ 이면 표 구조 인식 안 하고 "table" 카테고리도 flat text로 남는다)
  # type이 있으면 resource/<type>.yaml을 읽어 layout 설정에 병합한다

ocr:
  type: paddle
  # config: /app/resource/<이름>.yaml
  mode: auto # auto | force | disable
  # auto: 텍스트 레이어가 없거나(스캔 페이지) 글리프가 깨진 페이지만 OCR
  # force: 모든 페이지를 무조건 OCR
  # disable: OCR 호출 안 함


ext:
  pdf: pymupdf # pymupdf | pypdf
  html: bs4 # bs4 | libreoffice
  hwpx: rhwp # rhwp | libreoffice
  docx: python_docx
  csv: stdlib
  xlsx: openpyxl
  pptx: libreoffice
  ppt: libreoffice
  md: regex
  txt: plain
  png: pillow
  jpeg: pillow

chunker:
  type: smart_chunker # smart_chunker | hierarchical_chunker | hybrid_chunker
  chunk_size: 1000
  over_lap: 100
